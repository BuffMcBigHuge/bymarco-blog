{{- $title := .Get "title" -}}
{{- $src := .Get "src" -}}
{{- $srcMp3 := .Get "srcMp3" -}}
{{- $caption := .Get "caption" -}}
{{- $meta := .Get "meta" -}}
{{- $sourceLabel := .Get "sourceLabel" -}}
{{- $sourceUrl := .Get "sourceUrl" -}}
{{- $notes := .Get "notes" -}}

<figure class="oc-audio-sample">
  {{- if $title }}<figcaption class="oc-audio-sample__title">{{ $title }}</figcaption>{{ end -}}
  <audio class="oc-audio-sample__player" controls preload="none">
    {{- if $srcMp3 }}<source src="{{ $srcMp3 }}" type="audio/mpeg" />{{ end -}}
    {{- if $src }}<source src="{{ $src }}" />{{ end -}}
    Your browser does not support the audio element.
  </audio>
  {{- if or $caption $meta $sourceUrl $notes }}
  <div class="oc-audio-sample__body">
    {{- if $caption }}<p class="oc-audio-sample__caption">{{ $caption }}</p>{{ end -}}
    {{- if $meta }}<p class="oc-audio-sample__meta">{{ $meta }}</p>{{ end -}}
    {{- if $notes }}<p class="oc-audio-sample__notes">{{ $notes }}</p>{{ end -}}
    {{- if $sourceUrl }}
      <p class="oc-audio-sample__source">
        Source:
        <a href="{{ $sourceUrl }}" target="_blank" rel="noopener noreferrer">{{ $sourceLabel | default $sourceUrl }}</a>
      </p>
    {{- end -}}
  </div>
  {{- end }}
</figure>
