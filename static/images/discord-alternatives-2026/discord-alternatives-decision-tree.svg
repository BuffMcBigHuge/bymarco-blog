<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1000" fill="#0A0F1A"/>
  <text x="70" y="90" fill="#F8FAFC" font-size="44" font-family="Arial, sans-serif" font-weight="700">How to Choose a Self-Hosted Discord Alternative</text>
  <text x="70" y="130" fill="#94A3B8" font-size="22" font-family="Arial, sans-serif">Start with your real use case, not the logo you want to replace.</text>

  <rect x="560" y="170" width="480" height="90" rx="24" fill="#1D4ED8"/>
  <text x="640" y="225" fill="#EFF6FF" font-size="28" font-family="Arial, sans-serif" font-weight="700">What matters most to your group?</text>

  <line x1="800" y1="260" x2="800" y2="330" stroke="#475569" stroke-width="4"/>
  <line x1="300" y1="330" x2="1300" y2="330" stroke="#475569" stroke-width="4"/>
  <line x1="300" y1="330" x2="300" y2="390" stroke="#475569" stroke-width="4"/>
  <line x1="630" y1="330" x2="630" y2="390" stroke="#475569" stroke-width="4"/>
  <line x1="970" y1="330" x2="970" y2="390" stroke="#475569" stroke-width="4"/>
  <line x1="1300" y1="330" x2="1300" y2="390" stroke="#475569" stroke-width="4"/>

  <rect x="110" y="390" width="380" height="100" rx="22" fill="#111827" stroke="#334155"/>
  <text x="175" y="448" fill="#F8FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">Voice chat first</text>

  <rect x="440" y="390" width="380" height="100" rx="22" fill="#111827" stroke="#334155"/>
  <text x="500" y="448" fill="#F8FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">Ownership + sovereignty</text>

  <rect x="780" y="390" width="380" height="100" rx="22" fill="#111827" stroke="#334155"/>
  <text x="852" y="448" fill="#F8FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">Structured discussion</text>

  <rect x="1110" y="390" width="380" height="100" rx="22" fill="#111827" stroke="#334155"/>
  <text x="1190" y="448" fill="#F8FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">Discord-like feel</text>

  <line x1="300" y1="490" x2="300" y2="600" stroke="#475569" stroke-width="4"/>
  <line x1="630" y1="490" x2="630" y2="600" stroke="#475569" stroke-width="4"/>
  <line x1="970" y1="490" x2="970" y2="600" stroke="#475569" stroke-width="4"/>
  <line x1="1300" y1="490" x2="1300" y2="600" stroke="#475569" stroke-width="4"/>

  <rect x="120" y="600" width="360" height="150" rx="24" fill="#14532D"/>
  <text x="245" y="660" fill="#ECFDF5" font-size="34" font-family="Arial, sans-serif" font-weight="700">TeamSpeak</text>
  <text x="150" y="705" fill="#D1FAE5" font-size="22" font-family="Arial, sans-serif">Best when voice quality matters</text>
  <text x="150" y="735" fill="#D1FAE5" font-size="22" font-family="Arial, sans-serif">more than modern persistent chat.</text>

  <rect x="450" y="600" width="360" height="150" rx="24" fill="#1E3A8A"/>
  <text x="535" y="660" fill="#EFF6FF" font-size="34" font-family="Arial, sans-serif" font-weight="700">Matrix + Element</text>
  <text x="480" y="705" fill="#DBEAFE" font-size="22" font-family="Arial, sans-serif">Best general answer for self-hosting,</text>
  <text x="480" y="735" fill="#DBEAFE" font-size="22" font-family="Arial, sans-serif">durable chat, and long-term control.</text>

  <rect x="790" y="600" width="360" height="150" rx="24" fill="#713F12"/>
  <text x="915" y="660" fill="#FEF3C7" font-size="34" font-family="Arial, sans-serif" font-weight="700">Zulip</text>
  <text x="820" y="705" fill="#FDE68A" font-size="22" font-family="Arial, sans-serif">Best when your problem is message chaos,</text>
  <text x="820" y="735" fill="#FDE68A" font-size="22" font-family="Arial, sans-serif">not lack of channels.</text>

  <rect x="1120" y="600" width="360" height="150" rx="24" fill="#4C1D95"/>
  <text x="1210" y="660" fill="#F5F3FF" font-size="34" font-family="Arial, sans-serif" font-weight="700">Fluxer / Stoat</text>
  <text x="1150" y="705" fill="#EDE9FE" font-size="22" font-family="Arial, sans-serif">Most familiar for Discord users,</text>
  <text x="1150" y="735" fill="#EDE9FE" font-size="22" font-family="Arial, sans-serif">but still earlier-stage bets.</text>

  <rect x="470" y="820" width="660" height="110" rx="22" fill="#111827" stroke="#334155"/>
  <text x="560" y="870" fill="#F8FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">Need enterprise admin controls or playbooks?</text>
  <text x="615" y="905" fill="#94A3B8" font-size="22" font-family="Arial, sans-serif">Rocket.Chat for granular control, Mattermost for workflow-heavy business teams.</text>
</svg>
