<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <rect width="1400" height="780" fill="#0b1020"/>
  <text x="90" y="90" fill="#f8fafc" font-family="Inter, system-ui" font-size="44" font-weight="800">Three speed layers for local decoding</text>
  <text x="90" y="130" fill="#94a3b8" font-family="Inter, system-ui" font-size="22">They help different bottlenecks. Stacking them blindly is where bugs live.</text>
  <g font-family="Inter, system-ui">
    <rect x="90" y="190" width="1220" height="120" rx="24" fill="#111827" stroke="#334155"/>
    <text x="130" y="245" fill="#f5d36b" font-size="32" font-weight="800">1. ngram / suffix speculation</text>
    <text x="130" y="285" fill="#cbd5e1" font-size="22">No extra model. Exploits repetition in code, markdown, JSON, logs, and copy edits.</text>
    <rect x="90" y="345" width="1220" height="120" rx="24" fill="#111827" stroke="#334155"/>
    <text x="130" y="400" fill="#f5d36b" font-size="32" font-weight="800">2. MTP native heads</text>
    <text x="130" y="440" fill="#cbd5e1" font-size="22">The model drafts its own future tokens, then the main path verifies them.</text>
    <rect x="90" y="500" width="1220" height="120" rx="24" fill="#111827" stroke="#334155"/>
    <text x="130" y="555" fill="#f5d36b" font-size="32" font-weight="800">3. TurboQuant / KV compression</text>
    <text x="130" y="595" fill="#cbd5e1" font-size="22">Cuts long-context memory pressure so speculative decoding has room to work.</text>
    <path d="M710 310 V345" stroke="#f5d36b" stroke-width="6" stroke-linecap="round"/>
    <path d="M710 465 V500" stroke="#f5d36b" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
