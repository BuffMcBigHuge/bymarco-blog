    <text x="4" y="155" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="30">ngram • MTP • TurboQuant • Qwen3.6 • llama.cpp • vLLM</text>
  </g>
  <g transform="translate(150 430)">
