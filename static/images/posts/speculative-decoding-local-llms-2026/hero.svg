    <path d="M315 72 H480" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M460 42 L510 72 L460 102" fill="none" stroke="#f5d36b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="540" y="0" width="290" height="145" rx="26" fill="#111827" stroke="#374151" stroke-width="2"/>
    <text x="574" y="55" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="32" font-weight="700">verify</text>
