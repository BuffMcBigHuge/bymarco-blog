      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#2b1f0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d36b"/>
      <stop offset="100%" stop-color="#a68940"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#d6b24a" stroke-width="1">
    <path d="M80 160 H1520"/><path d="M80 300 H1520"/><path d="M80 440 H1520"/><path d="M80 580 H1520"/><path d="M80 720 H1520"/>
    <path d="M210 80 V820"/><path d="M430 80 V820"/><path d="M650 80 V820"/><path d="M870 80 V820"/><path d="M1090 80 V820"/><path d="M1310 80 V820"/>
