    <path d="M1000 42 L1050 72 L1000 102" fill="none" stroke="#f5d36b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1080" y="0" width="290" height="145" rx="26" fill="#111827" stroke="#374151" stroke-width="2"/>
    <text x="1114" y="55" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="32" font-weight="700">commit</text>
    <text x="1114" y="98" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui" font-size="24">emit more per pass</text>
